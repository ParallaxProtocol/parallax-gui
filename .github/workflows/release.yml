name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-gui:
    name: GUI ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            display_os: linux
            display_arch: x86_64
            target: linux/amd64
            runner: ubuntu-latest
            wails_tags: "embedfrontend webkit2_41"
          - os: linux
            arch: arm64
            display_os: linux
            display_arch: arm64
            target: linux/arm64
            runner: ubuntu-24.04-arm
            wails_tags: "embedfrontend webkit2_41"
          - os: darwin
            arch: amd64
            display_os: macos
            display_arch: x86_64
            target: darwin/amd64
            runner: macos-14
            wails_tags: "embedfrontend"
          - os: darwin
            arch: arm64
            display_os: macos
            display_arch: arm64
            target: darwin/arm64
            runner: macos-14
            wails_tags: "embedfrontend"
          - os: windows
            arch: amd64
            display_os: windows
            display_arch: x86_64
            target: windows/amd64
            runner: windows-latest
            wails_tags: "embedfrontend"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Linux build deps
        if: matrix.os == 'linux'
        run: |
          for i in 1 2 3 4; do
            sudo apt-get update -o Acquire::Retries=3 && break
            echo "::warning::apt-get update attempt $i failed, retrying"
            sudo rm -rf /var/lib/apt/lists/partial/*
            sleep $((i * 15))
          done
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            zip

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build GUI bundle
        shell: bash
        env:
          WAILS_TAGS: ${{ matrix.wails_tags }}
          GOPRIVATE: github.com/ParallaxProtocol/*
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          make prlx-gui-package GUI_TARGETS="${{ matrix.target }}" VERSION="$VERSION"

      - name: Verify build output exists
        shell: bash
        run: |
          ls -lh build/bin/

      - name: Build Linux AppImage
        if: matrix.os == 'linux'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DISPLAY_ARCH="${{ matrix.display_arch }}"

          # appimagetool uses aarch64 in its release filenames
          APPTOOL_ARCH="${DISPLAY_ARCH}"
          [ "$APPTOOL_ARCH" = "arm64" ] && APPTOOL_ARCH="aarch64"

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${APPTOOL_ARCH}.AppImage" -O appimagetool
          chmod +x appimagetool

          # Build AppDir structure
          APPDIR="build/Parallax-Client.AppDir"
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp "build/bin/Parallax Client" "${APPDIR}/usr/bin/parallax-client"
          chmod +x "${APPDIR}/usr/bin/parallax-client"

          # Bundle hashwarp if present
          if [ -f "build/bin/hashwarp" ]; then
            cp build/bin/hashwarp "${APPDIR}/usr/bin/hashwarp"
            chmod +x "${APPDIR}/usr/bin/hashwarp"
          fi

          cp build/appicon/appicon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/parallax-client.png"
          cp build/appicon/appicon.png "${APPDIR}/parallax-client.png"
          cp build/linux/parallax-client.desktop "${APPDIR}/parallax-client.desktop"

          # Create AppRun script
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          exec "${HERE}/usr/bin/parallax-client" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Build the AppImage (--appimage-extract-and-run avoids FUSE requirement in CI)
          ARCH="${APPTOOL_ARCH}" ./appimagetool --appimage-extract-and-run "${APPDIR}" \
            "build/package/Parallax-Client-${VERSION}-linux-${DISPLAY_ARCH}.AppImage"
          chmod +x "build/package/Parallax-Client-${VERSION}-linux-${DISPLAY_ARCH}.AppImage"
          ls -lh build/package/

      - name: Build Windows installer
        if: matrix.os == 'windows'
        shell: bash
        run: |
          choco install nsis -y --no-progress
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          VERSION="${{ steps.version.outputs.version }}"
          makensis -DVERSION="$VERSION" \
                   -DBINDIR="$(pwd)/build/bin" \
                   build/windows/installer.nsi
          mv "build/windows/Parallax-Client-${VERSION}-windows-x86_64-setup.exe" build/package/
          ls -lh build/package/

      - name: Build macOS DMG
        if: matrix.os == 'darwin'
        shell: bash
        run: |
          brew install create-dmg
          VERSION="${{ steps.version.outputs.version }}"
          DISPLAY_ARCH="${{ matrix.display_arch }}"
          APP_NAME="Parallax Client.app"
          DMG_NAME="Parallax-Client-${VERSION}-macos-${DISPLAY_ARCH}.dmg"

          # Debug: show what wails produced
          ls -lhR build/bin/

          # If hashwarp binary exists, embed it inside the .app bundle
          if [ -f "build/bin/hashwarp" ]; then
            mkdir -p "build/bin/${APP_NAME}/Contents/Resources"
            cp build/bin/hashwarp "build/bin/${APP_NAME}/Contents/Resources/"
          fi

          # Stage the .app into its own directory for create-dmg
          DMG_STAGE="build/dmg-stage"
          mkdir -p "${DMG_STAGE}"
          cp -a "build/bin/${APP_NAME}" "${DMG_STAGE}/"

          create-dmg \
            --volname "Parallax Client" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${APP_NAME}" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "build/package/${DMG_NAME}" \
            "${DMG_STAGE}"
          ls -lh build/package/

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: parallax-gui-${{ matrix.display_os }}-${{ matrix.display_arch }}
          path: build/package/Parallax-Client-*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish draft release
    needs: [build-gui]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release directory
        run: |
          mkdir -p release
          find artifacts -type f -name 'Parallax-Client-*' -exec cp {} release/ \;
          cd release
          ls -lh
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Parallax-Client-*
            release/SHA256SUMS.txt
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
