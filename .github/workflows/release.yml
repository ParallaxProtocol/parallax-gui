name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-gui:
    name: GUI ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            target: linux/amd64
            runner: ubuntu-latest
            wails_tags: "embedfrontend webkit2_41"
          - os: linux
            arch: arm64
            target: linux/arm64
            runner: ubuntu-24.04-arm
            wails_tags: "embedfrontend webkit2_41"
          - os: darwin
            arch: amd64
            target: darwin/amd64
            runner: macos-14
            wails_tags: "embedfrontend"
          - os: darwin
            arch: arm64
            target: darwin/arm64
            runner: macos-14
            wails_tags: "embedfrontend"
          - os: windows
            arch: amd64
            target: windows/amd64
            runner: windows-latest
            wails_tags: "embedfrontend"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Linux build deps
        if: matrix.os == 'linux'
        run: |
          for i in 1 2 3 4; do
            sudo apt-get update -o Acquire::Retries=3 && break
            echo "::warning::apt-get update attempt $i failed, retrying"
            sudo rm -rf /var/lib/apt/lists/partial/*
            sleep $((i * 15))
          done
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            zip

      - name: Install Windows zip
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install zip -y --no-progress

      - name: Build GUI bundle
        shell: bash
        env:
          WAILS_TAGS: ${{ matrix.wails_tags }}
          GOPRIVATE: github.com/ParallaxProtocol/*
        run: |
          make prlx-gui-package GUI_TARGETS="${{ matrix.target }}"

      - name: Verify artifact exists
        shell: bash
        run: |
          ls -lh build/package/parallax-gui-${{ matrix.os }}-${{ matrix.arch }}.zip

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: parallax-gui-${{ matrix.os }}-${{ matrix.arch }}
          path: build/package/parallax-gui-${{ matrix.os }}-${{ matrix.arch }}.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish draft release
    needs: [build-gui]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release directory
        run: |
          mkdir -p release
          find artifacts -type f -name '*.zip' -exec cp {} release/ \;
          cd release
          ls -lh
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/parallax-gui-*.zip
            release/SHA256SUMS.txt
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
